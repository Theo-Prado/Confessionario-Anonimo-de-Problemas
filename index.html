<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confessionário Anônimo</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

textarea,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:10px;
}

button{
    padding:12px;
    cursor:pointer;
}

.relato{
    border-top:1px solid #334155;
    margin-top:15px;
    padding-top:15px;
}

.resposta{
    background:#334155;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
}

</style>

</head>
<body>

<div class="container">

<h1>🕊️ Confessionário Anônimo</h1>

<div class="card">

<h2>Novo Relato</h2>

<select id="categoria">
    <option>Família</option>
    <option>Relacionamentos</option>
    <option>Escola</option>
    <option>Trabalho</option>
    <option>Fé</option>
    <option>Ansiedade</option>
    <option>Outros</option>
</select>

<textarea
id="texto"
placeholder="Escreva seu relato..."
></textarea>

<button onclick="publicarRelato()">
Publicar Relato
</button>

</div>

<div class="card">

<h2>Relatos</h2>

<div id="listaRelatos"></div>

</div>

</div>

<script>

const API = "";

async function publicarRelato(){

    const categoria =
        document.getElementById("categoria").value;

    const texto =
        document.getElementById("texto").value;

    await fetch("/api/relatos",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            categoria,
            texto
        })
    });

    document.getElementById("texto").value = "";

    carregarRelatos();
}

async function responder(id){

    const campo =
        document.getElementById("resp_" + id);

    const texto = campo.value;

    await fetch("/api/respostas",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            relato_id:id,
            texto:texto
        })
    });

    carregarRelatos();
}

async function carregarRelatos(){

    const resposta =
        await fetch("/api/relatos");

    const relatos =
        await resposta.json();

    const lista =
        document.getElementById("listaRelatos");

    lista.innerHTML = "";

    relatos.forEach(relato=>{

        let html = `
        <div class="relato">

        <h3>${relato.categoria}</h3>

        <p>${relato.texto}</p>

        <small>${relato.data}</small>

        <div>
        <textarea
        id="resp_${relato.id}"
        placeholder="Responder..."
        ></textarea>

```
    <button onclick="responder(${relato.id})">
    Responder
    </button>
    </div>
    `;

    relato.respostas.forEach(resp=>{

        html += `
        <div class="resposta">
            ${resp.texto}
        </div>
        `;

    });

    html += "</div>";

    lista.innerHTML += html;

});
```

}

carregarRelatos();

</script>

</body>
</html>
