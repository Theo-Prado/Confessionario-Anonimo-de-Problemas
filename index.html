<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CONFESS0R - Sistema Anônimo de Confissões</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            position: relative;
        }

        /* Grid background effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            padding: 40px 0;
            border-bottom: 2px solid #00ff88;
            border-top: 2px solid #ff00ff;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), 0 0 40px rgba(255, 0, 255, 0.2);
        }

        h1 {
            font-size: 3.5em;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #ff00ff, 0 0 30px rgba(0, 255, 136, 0.5);
            animation: glitch 2s infinite;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.9em;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            letter-spacing: 2px;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px #00ff88, 0 0 20px #ff00ff; }
            50% { text-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffff, 0 0 40px #00ff88; }
        }

        /* Cards */
        .card {
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.9) 0%, rgba(20, 24, 50, 0.9) 100%);
            border: 2px solid #00ff88;
            border-radius: 0;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 20px rgba(0, 255, 136, 0.4),
                inset 0 0 20px rgba(0, 255, 136, 0.1),
                0 0 40px rgba(255, 0, 255, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #00ff88, #ff00ff, #00ffff);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .card h2 {
            color: #ff00ff;
            font-size: 1.8em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff00ff;
            border-bottom: 1px dashed #00ff88;
            padding-bottom: 10px;
        }

        /* Form Elements */
        select, textarea {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            margin-bottom: 15px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid #00ff88;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            border-radius: 0;
            resize: vertical;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.2);
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 
                inset 0 0 10px rgba(255, 0, 255, 0.3),
                0 0 20px rgba(255, 0, 255, 0.4);
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        select option {
            background: #0f172a;
            color: #00ff88;
        }

        textarea::placeholder {
            color: #00ff88;
            opacity: 0.5;
        }

        /* Buttons */
        button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #00ff88 0%, #00ffff 100%);
            color: #0a0e27;
            border: 2px solid #00ff88;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        button:hover {
            background: linear-gradient(135deg, #ff00ff 0%, #00ffff 100%);
            border-color: #ff00ff;
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.8), 0 0 40px rgba(0, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Relatos */
        .relato {
            background: rgba(30, 41, 59, 0.6);
            border-left: 4px solid #00ff88;
            padding: 20px;
            margin: 20px 0;
            border-radius: 0;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .relato:hover {
            border-left-color: #ff00ff;
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.4);
            transform: translateX(10px);
        }

        .relato h3 {
            color: #00ffff;
            font-size: 1.2em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffff;
        }

        .relato p {
            color: #e0e7ff;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .relato small {
            color: #7c3aed;
            font-size: 0.85em;
            text-shadow: 0 0 5px #7c3aed;
        }

        /* Respostas */
        .resposta {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            border-left: 3px solid #a855f7;
            padding: 15px;
            margin-top: 15px;
            border-radius: 0;
            color: #d8b4fe;
            font-size: 0.95em;
            box-shadow: inset 0 0 10px rgba(168, 85, 247, 0.2);
        }

        .resposta::before {
            content: '» ';
            color: #a855f7;
            font-weight: bold;
        }

        /* Counter */
        .counter {
            text-align: right;
            color: #7c3aed;
            font-size: 0.8em;
            margin-top: 5px;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(124, 58, 237, 0.1);
            border: 2px solid #7c3aed;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
        }

        .stat-number {
            font-size: 2em;
            color: #a855f7;
            font-weight: bold;
            text-shadow: 0 0 10px #a855f7;
        }

        .stat-label {
            color: #7c3aed;
            font-size: 0.9em;
            margin-top: 5px;
        }

        /* Loading */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .card {
                padding: 20px;
            }

            button {
                width: 100%;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 255, 136, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff00ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ CONFESS0R ⚡</h1>
            <div class="subtitle">> SISTEMA ANÔNIMO DE CONFISSÕES v1.0 <<</div>
        </header>

        <!-- Form Card -->
        <div class="card">
            <h2>📤 NOVO RELATO</h2>

            <label style="color: #00ff88; text-shadow: 0 0 10px #00ff88;">CATEGORIA:</label>
            <select id="categoria">
                <option>🏠 Família</option>
                <option>💔 Relacionamentos</option>
                <option>🎓 Escola</option>
                <option>💼 Trabalho</option>
                <option>✨ Fé</option>
                <option>😰 Ansiedade</option>
                <option>❓ Outros</option>
            </select>

            <label style="color: #00ff88; text-shadow: 0 0 10px #00ff88; display: block; margin-top: 15px;">MENSAGEM:</label>
            <textarea
                id="texto"
                placeholder="Digite sua confissão anônima aqui... [MÁXIMO 500 CARACTERES]"
                maxlength="500"
                rows="5"
            ></textarea>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button onclick="publicarRelato()">
                    ✓ ENVIAR CONFISSÃO
                </button>
                <span style="color: #7c3aed; font-size: 0.9em;">
                    <span id="charCount">0</span>/500
                </span>
            </div>
        </div>

        <!-- Stats Card -->
        <div class="stats" id="statsContainer" style="display: none;">
            <div class="stat-box">
                <div class="stat-number" id="totalRelatos">0</div>
                <div class="stat-label">CONFISSÕES ENVIADAS</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="totalRespostas">0</div>
                <div class="stat-label">RESPOSTAS DE APOIO</div>
            </div>
        </div>

        <!-- Relatos Card -->
        <div class="card">
            <h2>📥 CONFISSÕES RECEBIDAS</h2>
            <div id="listaRelatos" style="min-height: 200px;">
                <div style="color: #7c3aed; text-align: center; padding: 40px; font-size: 1.2em;">
                    ▀▄▀▄▀ CARREGANDO CONFISSÕES... ▀▄▀▄▀
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "";

        // Character counter
        document.getElementById("texto").addEventListener("input", function() {
            document.getElementById("charCount").textContent = this.value.length;
        });

        async function publicarRelato() {
            const categoria = document.getElementById("categoria").value;
            const texto = document.getElementById("texto").value.trim();

            if (!texto) {
                alert("⚠️ Escreva algo antes de enviar!");
                return;
            }

            const botao = event.target;
            botao.disabled = true;
            botao.textContent = "⟳ ENVIANDO...";

            try {
                await fetch("/api/relatos", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        categoria,
                        texto
                    })
                });

                document.getElementById("texto").value = "";
                document.getElementById("charCount").textContent = "0";
                carregarRelatos();
                setTimeout(() => {
                    botao.disabled = false;
                    botao.textContent = "✓ ENVIAR CONFISSÃO";
                }, 1000);
            } catch (erro) {
                alert("❌ Erro ao enviar confissão");
                botao.disabled = false;
                botao.textContent = "✓ ENVIAR CONFISSÃO";
            }
        }

        async function responder(id) {
            const campo = document.getElementById("resp_" + id);
            const texto = campo.value.trim();

            if (!texto) {
                alert("⚠️ Escreva uma resposta!");
                return;
            }

            try {
                await fetch("/api/respostas", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        relato_id: id,
                        texto: texto
                    })
                });

                carregarRelatos();
            } catch (erro) {
                alert("❌ Erro ao responder");
            }
        }

        async function carregarRelatos() {
            try {
                const resposta = await fetch("/api/relatos");
                const relatos = await resposta.json();

                const lista = document.getElementById("listaRelatos");
                lista.innerHTML = "";

                let totalRespostas = 0;

                if (relatos.length === 0) {
                    lista.innerHTML = `
                        <div style="color: #7c3aed; text-align: center; padding: 40px; font-size: 1.1em;">
                            🔇 NENHUMA CONFISSÃO AINDA...<br>
                            <small>Seja o primeiro a se confessar</small>
                        </div>
                    `;
                    document.getElementById("statsContainer").style.display = "none";
                    return;
                }

                relatos.forEach((relato, index) => {
                    totalRespostas += relato.respostas.length;

                    let html = `
                        <div class="relato">
                            <div style="display: flex; justify-content: space-between; align-items: start;">
                                <div>
                                    <h3>[${String(index + 1).padStart(3, '0')}] ${relato.categoria}</h3>
                                    <p>${relato.texto}</p>
                                    <small>🕐 ${relato.data}</small>
                                </div>
                                <span class="counter">${relato.respostas.length} resposta(s)</span>
                            </div>
                            <div>
                                <textarea
                                    id="resp_${relato.id}"
                                    placeholder="Envie uma mensagem de apoio..."
                                    maxlength="300"
                                    style="margin-top: 15px; font-size: 0.9em;"
                                    rows="2"
                                ></textarea>
                                <button onclick="responder(${relato.id})" style="width: auto; margin-top: 8px;">
                                    → RESPONDER
                                </button>
                            </div>
                    `;

                    if (relato.respostas.length > 0) {
                        html += `<div style="margin-top: 15px; border-top: 1px dashed #00ff88; padding-top: 15px;">`;
                        relato.respostas.forEach(resp => {
                            html += `
                                <div class="resposta">
                                    ${resp.texto}<br>
                                    <small style="display: block; margin-top: 5px; color: #a855f7;">🕐 ${resp.data}</small>
                                </div>
                            `;
                        });
                        html += `</div>`;
                    }

                    html += "</div>";
                    lista.innerHTML += html;
                });

                // Update stats
                document.getElementById("totalRelatos").textContent = relatos.length;
                document.getElementById("totalRespostas").textContent = totalRespostas;
                document.getElementById("statsContainer").style.display = "grid";

            } catch (erro) {
                console.error("Erro ao carregar relatos:", erro);
            }
        }

        carregarRelatos();
        // Auto-refresh every 10 seconds
        setInterval(carregarRelatos, 10000);
    </script>
</body>
</html>
